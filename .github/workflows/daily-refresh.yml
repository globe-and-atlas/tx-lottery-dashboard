name: Daily Data Refresh

on:
  schedule:
    # Run at 12:00 UTC (7am Central) daily.
    - cron: '0 12 * * *'
  workflow_dispatch: # Allow manual triggers

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          
      - name: Install Dependencies
        run: npm ci
          
      - name: Scraping Texas Lottery Data
        run: npm run refresh:data
        
      - name: Commit & Push Changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add src/data/lottery-data.json src/data/lottery-history.json
          git commit -m "chore(data): automated daily automated lottery update" || echo "No changes to commit"
          git push
